<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background — Octopus Energy brand pink -->
  <rect width="256" height="256" rx="52" fill="#E3125A"/>

  <!-- Octopus body -->
  <ellipse cx="128" cy="104" rx="56" ry="52" fill="white"/>

  <!-- Mantle top (dome) -->
  <ellipse cx="128" cy="82" rx="44" ry="36" fill="white"/>

  <!-- Eyes -->
  <circle cx="111" cy="98" r="12" fill="#E3125A"/>
  <circle cx="145" cy="98" r="12" fill="#E3125A"/>
  <!-- Pupils -->
  <circle cx="114" cy="96" r="5" fill="white"/>
  <circle cx="148" cy="96" r="5" fill="white"/>
  <!-- Shine -->
  <circle cx="116" cy="94" r="2" fill="#E3125A"/>
  <circle cx="150" cy="94" r="2" fill="#E3125A"/>

  <!-- Mouth curve -->
  <path d="M116 114 Q128 122 140 114" stroke="#E3125A" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- 8 tentacles with curled tips -->
  <!-- Left outer -->
  <path d="M86 142 C74 158 62 168 58 184 C55 196 64 204 72 196 C78 190 80 178 86 166"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Left mid-outer -->
  <path d="M100 152 C92 170 90 188 94 202 C97 212 108 214 112 204 C116 194 112 178 110 162"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Left mid-inner -->
  <path d="M116 156 C114 176 116 194 122 206 C126 214 136 214 138 204 C140 194 136 176 132 158"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Right mid-inner -->
  <path d="M142 154 C146 174 148 192 144 206 C141 216 130 216 128 206 C126 196 130 178 134 160"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Right mid-outer -->
  <path d="M156 150 C164 168 166 186 162 200 C158 212 148 212 146 202 C144 192 148 176 150 162"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  <!-- Right outer -->
  <path d="M168 140 C180 156 192 166 196 182 C199 194 190 202 182 196 C176 190 174 178 168 164"
        stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Sucker dots on two front tentacles (detail) -->
  <circle cx="115" cy="178" r="3" fill="#E3125A"/>
  <circle cx="113" cy="192" r="3" fill="#E3125A"/>
  <circle cx="141" cy="178" r="3" fill="#E3125A"/>
  <circle cx="143" cy="192" r="3" fill="#E3125A"/>
</svg>
