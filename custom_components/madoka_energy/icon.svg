<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#744210"/>

  <!-- Thermostat body -->
  <rect x="72" y="56" width="112" height="144" rx="20" fill="white"/>
  <rect x="80" y="64" width="96" height="128" rx="14" fill="#FEF3C7"/>

  <!-- Display area -->
  <rect x="88" y="72" width="80" height="56" rx="8" fill="white"/>

  <!-- Temperature display -->
  <text x="128" y="108" font-family="sans-serif" font-size="28" font-weight="bold" fill="#744210" text-anchor="middle">21°</text>

  <!-- BLE symbol -->
  <path d="M128 142 L128 172" stroke="#92400E" stroke-width="5" stroke-linecap="round"/>
  <path d="M128 142 L142 154 L128 166" stroke="#92400E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M128 142 L114 154 L128 166" stroke="#92400E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Energy bolt -->
  <path d="M158 74 L150 90 L158 90 L148 108 L166 84 L158 84 Z" fill="#D97706"/>

  <!-- Bottom label -->
  <rect x="96" y="176" width="64" height="8" rx="4" fill="#D97706" opacity="0.4"/>
</svg>
